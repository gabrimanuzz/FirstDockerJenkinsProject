version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: draghidb
      POSTGRES_USER: drago
      POSTGRES_PASSWORD: drago123
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/draghidb
      SPRING_DATASOURCE_USERNAME: drago
      SPRING_DATASOURCE_PASSWORD: drago123

volumes:
  db_data: